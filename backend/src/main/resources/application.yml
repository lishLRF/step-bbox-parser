spring:
  application:
    name: step-bbox-parser
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# 0 = let the OS pick a free port from the dynamic range (49152-65535 on Windows).
# The actually-assigned port is written to <work-dir>/step-bbox-parser/.port at startup
# (see PortPublisher) so the frontend dev server / launcher can find it.
server:
  port: 0

parser:
  upload-dir: ${java.io.tmpdir}/step-bbox-parser/uploads
  work-dir: ${java.io.tmpdir}/step-bbox-parser/work

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,shutdown
  # Enable graceful shutdown via POST /actuator/shutdown so the launcher can stop
  # the app cleanly on Windows (where taskkill can't send a gentle signal to a
  # console process). This triggers @PreDestroy → .port file is removed.
  endpoint:
    shutdown:
      enabled: true
