spring:
  application:
    name: step-bbox-parser
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# 0 = let the OS pick a free port from the dynamic range (49152-65535 on Windows).
# The actually-assigned port is written to <work-dir>/.port at startup
# (see PortPublisher) so the frontend dev server / launcher can find it.
server:
  port: 0

parser:
  upload-dir: Z:/Project/3Dbox-step/cache/uploads
  work-dir: Z:/Project/3Dbox-step/cache/work

mesh:
  python-exe: ${MESH_PYTHON_EXE:Z:/conda_envs/step-mesh/python.exe}
  script: ${MESH_SCRIPT:scripts/step_to_mesh.py}
  bbox-script: ${MESH_BBOX_SCRIPT:scripts/step_to_bbox.py}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,shutdown
  endpoint:
    shutdown:
      enabled: true
