spring:
  application:
    name: step-bbox-parser
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

server:
  port: 0

# These are FALLBACK values only. The actual cache dir and python exe are
# managed by AppSettings (config.json) and injected at runtime. Override
# via env vars only for headless/CI use.
parser:
  upload-dir: ${STEP_BBOX_CACHE_DIR:../cache}/uploads
  work-dir: ${STEP_BBOX_CACHE_DIR:../cache}/work

mesh:
  python-exe: ${MESH_PYTHON_EXE:}
  script: ${MESH_SCRIPT:scripts/step_to_mesh.py}
  bbox-script: ${MESH_BBOX_SCRIPT:scripts/step_to_bbox.py}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,shutdown
  endpoint:
    shutdown:
      enabled: true
